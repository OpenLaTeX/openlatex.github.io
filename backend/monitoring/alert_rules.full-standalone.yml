groups:
  - name: openlatex
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} down"
          description: "{{ $labels.job }} est inaccessible depuis plus d'1 minute."

      - alert: CompilerSuccessRateLow
        expr: |
          sum(rate(latex_compile_total{job="compiler-standalone",result="success"}[5m]))
          / sum(rate(latex_compile_total{job="compiler-standalone"}[5m])) * 100 < 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Taux de succès compilateur < 80%"
          description: "Le taux de succès des compilations est {{ $value | printf \"%.1f\" }}% sur les 5 dernières minutes."

      - alert: CompilerP95High
        expr: histogram_quantile(0.95, sum by (le) (rate(latex_compile_duration_seconds_bucket{job="compiler-standalone"}[5m]))) > 25
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "p95 compilation > 25s"
          description: "Le p95 des compilations est {{ $value | printf \"%.1f\" }}s sur les 5 dernières minutes."

      - alert: CompilerQueueSaturated
        expr: latex_compile_queue_depth{job="compiler-standalone"} >= 8
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Queue compilateur presque pleine"
          description: "Service standalone : {{ $value }} requêtes en attente (max 10)."

      - alert: HttpErrorRateHigh
        expr: |
          sum(rate(http_request_duration_seconds_count{job="compiler-standalone",status_code=~"5.."}[5m]))
          / sum(rate(http_request_duration_seconds_count{job="compiler-standalone"}[5m])) * 100 > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Taux d'erreurs HTTP 5xx > 5%"
          description: "{{ $labels.job }} retourne {{ $value | printf \"%.1f\" }}% d'erreurs 5xx."
