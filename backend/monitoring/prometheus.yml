global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: 'account-manager'
    static_configs:
      - targets: ['backend:8000']
  - job_name: 'compiler'
    static_configs:
      - targets: ['compile:9000']
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
