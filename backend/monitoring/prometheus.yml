global:
  scrape_interval: 120s

scrape_configs:
  - job_name: 'account-manager'
    static_configs:
      - targets: ['backend:8000']
  - job_name: 'compiler'
    scrape_interval: 15s
    static_configs:
      - targets: ['compile:9000']
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
