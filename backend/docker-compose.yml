services:
  postgres:
    build: ./postgres
    container_name: openlatex_postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openlatex

  backend:
    image: ghcr.io/openlatex/openlatex-account-manager:latest
    container_name: openlatex_account-manager
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      FRONTEND_URL: ${FRONTEND_URL}
      PORT: 8000
    networks:
      - openlatex

  compile:
    image: ghcr.io/openlatex/openlatex-compile:latest
    container_name: openlatex_compile
    restart: unless-stopped
    environment:
      FRONTEND_URL: ${FRONTEND_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 9000
    volumes:
      - /tmp/openlatex-compile:/tmp
    networks:
      - openlatex

  caddy:
    image: caddy:2
    container_name: openlatex_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - openlatex

volumes:
  caddy_data:
  caddy_config:
  postgres_data:

networks:
  openlatex:
    driver: bridge
