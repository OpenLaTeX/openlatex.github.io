# ici : services, ingress, networkpolicy
---
apiVersion: v1
kind: Service
metadata:
  name: latex-compile-redis-svc
  namespace: {{ .Values.namespace }}
spec:
  type: ClusterIP
  selector:
    app: latex-compile-redis
  ports:
  - port: 6379
    targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: latex-compile-queue-producer-svc
  namespace: {{ .Values.namespace }}
spec:
  type: NodePort
  selector:
    app: latex-compile-queue-producer
  ports:
  - port: 80
    targetPort: 9000
    nodePort: {{ .Values.nodePort }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: latex-compile-queue-producer-ingress
  namespace: {{ .Values.namespace }}
spec:
  ingressClassName: traefik
  rules:
  # pour namespace prod c'est openlatex.blavogiez.fr pour la version test c'est openlatex-dev.blavogiez.fr
  - host: {{ .Values.namespacedUrl }}
    http:
      paths:
      - backend:
          service:
            name: latex-compile-queue-producer-svc
            port:
              number: 80
        path: /compile
        pathType: Exact
status:
  loadBalancer: {}
# curl -v --resolve openlatex.blavogiez.fr:80:172.16.10.52 http://openlatex.blavogiez.fr/compile
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy 
metadata: 
  name: latex-networking-rules-queue-worker
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: latex-compile-queue-worker 
  policyTypes:
  - Egress
  
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: latex-compile-redis
      ports:
        - protocol: TCP
          port: 6379 
      # on autorise le dns en sortie
    - ports:
        - protocol: TCP
          port: 53 
        - protocol: UDP
          port: 53 
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy 
metadata: 
  name: latex-networking-rules-queue-producer
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: latex-compile-queue-producer 
  policyTypes:
  - Egress
  
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: latex-compile-redis
      ports:
        - protocol: TCP
          port: 6379
    # on autorise le dns en sortie
    - ports:
        - protocol: TCP
          port: 53 
        - protocol: UDP
          port: 53 
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy 
metadata: 
  name: latex-networking-rules-redis
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: latex-compile-redis 
  policyTypes:
  - Ingress
  
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: latex-compile-queue-worker 
        - podSelector:
            matchLabels:
              app: latex-compile-queue-producer 
      ports:
        - protocol: TCP
          port: 6379 

          
