# compose qui intègre le compilateur, pour un déploiement qui n'utiliserait pas Kubernetes / Helm, donc plus léger
# docker compose -f docker-compose.full-standalone.yml up -d
# nécessite un .env, sinon les valeurs seront celles par défaut. Il est conseillé de générer aléatoirement ces valeurs avec le script gen-env.sh
name: openlatex

services:
  postgres:
    build: ../../backend/postgres
    container_name: openlatex_postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openlatex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openlatex}
      POSTGRES_DB: ${POSTGRES_DB:-openlatex}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - openlatex
  
  frontend:
    build: 
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: openlatex_frontend 
    restart: unless-stopped
    networks:
      - openlatex  

  backend:
    build:
      context: ../../backend
      dockerfile: account-crud-api/Dockerfile
    container_name: openlatex_account-manager
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openlatex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openlatex}
      POSTGRES_DB: ${POSTGRES_DB:-openlatex}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      PORT: 8000
    networks:
      - openlatex

  compile-standalone:
    build:
      context: ../../backend
      dockerfile: compiler/standalone/Dockerfile
    container_name: openlatex_compile_standalone
    restart: unless-stopped
    environment:
      FRONTEND_URL: ${FRONTEND_URL:-localhost}
      JWT_SECRET: ${JWT_SECRET:-changeme}
      TEST_BYPASS_SECRET: ${TEST_BYPASS_SECRET:-changeme}
      PORT: 9000
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 768M
    networks:
      - openlatex

  caddy:
    image: caddy:2
    container_name: openlatex_caddy
    restart: unless-stopped
    environment:
      COMPILER_ADDRESS: ${COMPILER_ADDRESS:-localhost:9000}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../../backend/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - openlatex

  collab:
    build:
      context: ../../backend
      dockerfile: collab-websocket/Dockerfile
    container_name: openlatex_collab
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openlatex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openlatex}
      POSTGRES_DB: ${POSTGRES_DB:-openlatex}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      JWT_SECRET: ${JWT_SECRET:-changeme}
      PORT: 7000
    networks:
      - openlatex

  prometheus:
    image: prom/prometheus:v3.11.2
    container_name: openlatex_prometheus
    restart: unless-stopped
    # on ouvre pour que le réseau privé écrive dedans
    ports:
      - "0.0.0.0:9090:9090"
    volumes:
      - ../../backend/monitoring/prometheus.full-standalone.yml:/etc/prometheus/prometheus.yml:ro
      - ../../backend/monitoring/alert_rules.full-standalone.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-remote-write-receiver'
      - '--web.enable-admin-api'
    networks:
      - openlatex

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: openlatex_postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - openlatex

  grafana:
    image: grafana/grafana-oss:10.4.3
    container_name: openlatex_grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
      - ../../backend/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../../backend/monitoring/grafana/dashboards-full-standalone:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: ${GRAFANA_SERVER_URL:-https://localhost/grafana}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_NAME: "Main Org."
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    networks:
      - openlatex

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  openlatex:
    driver: bridge
