# deployer k3s sur master
# on rappelle que k3s est installé en user data de terraform
# Ce playbook tourne sur le contrôleur local et parle directement à l'API k3s. de ce fait pas besoin de config le ssh

---
- hosts: localhost
  connection: local
  gather_facts: false
  vars:
    frontend_url: "{{ lookup('env', 'FRONTEND_URL') }}"
    test_bypass_secret: "{{ lookup('env', 'TEST_BYPASS_SECRET') }}"
    kubeconfig: "{{ lookup('env', 'KUBECONFIG') | default('./k3s.yaml') }}"
  tasks:
    - name: Appliquer le secret latex-compile-env (bypass secret + frontend url pourle CORS)
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ kubeconfig }}"
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: latex-compile-env
            namespace: default
          stringData:
            FRONTEND_URL: "{{ frontend_url }}"
            TEST_BYPASS_SECRET: "{{ test_bypass_secret }}"
      no_log: true

    - name: Déployer le manifest latex-compile
      kubernetes.core.k8s:
        state: present
        kubeconfig: "{{ kubeconfig }}"
        src: "{{ playbook_dir }}/../../infra/kubernetes/latex-compile.yaml"

    - name: Rollout restart pour appliquer le nouveau secret
      kubernetes.core.k8s:
        state: patched
        kubeconfig: "{{ kubeconfig }}"
        kind: Deployment
        name: latex-compile
        namespace: default
        definition:
          spec:
            template:
              metadata:
                annotations:
                  kubectl.kubernetes.io/restartedAt: "{{ now(utc=True, fmt='%Y-%m-%dT%H:%M:%SZ') }}"

    - name: Attendre que le déploiement soit prêt
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig }}"
        kind: Deployment
        name: latex-compile
        namespace: default
        wait: true
        wait_condition:
          type: Available
          status: "True"
        wait_timeout: 120
