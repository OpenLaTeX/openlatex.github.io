name: Build Backend Image

on:
  push:
    paths:
      - 'backend/compiler/**'
    branches: [main, backend/release]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend/compiler
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/openlatex-backend:latest
