name: (DOCKER/COMPILER-BASE) - Construction de l'image de base texlive
# cette image contient node:22-alpine + texlive-full (4 GB).
# Elle est reconstruite manuellement car elle change rarement
# le Dockerfile compiler l'utilise comme FROM, évitant de réinstaller texlive à chaque push
# ca optimise le flux réseau des constructions d'images

on:
  workflow_dispatch:

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/compiler
          file: ./backend/compiler/Dockerfile.base
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/openlatex-texlive-base:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
