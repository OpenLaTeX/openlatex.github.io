name: (DOCKER/BACKEND) - Construction et déploiement des images spécifiques + test infra
# Les images "account-manager" et "compiler" sont construites en CI et publiées sur GHCR
# pour éviter de consommer les ressources du VPS pendant le build.
# Postgres (build local léger) et Caddy (image publique) ne changent quasiment jamais donc ils sont gérés directement par docker-compose sur le VPS

on:
  push:
    branches: 
      - main 
  workflow_dispatch:

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  code-test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npm test
        working-directory: backend

  detect-changes:
    runs-on: self-hosted
    outputs:
      manager: ${{ steps.filter.outputs.manager }}
      compiler: ${{ steps.filter.outputs.compiler }}
      queue_producer: ${{ steps.filter.outputs.queue_producer }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Résoudre le SHA du commit précédent
        id: prev
        run: echo "sha=$(git rev-parse HEAD~1)" >> $GITHUB_OUTPUT
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ steps.prev.outputs.sha }}
          filters: |
            manager:
              - 'backend/account-crud-api/**'
              - 'backend/shared/**'
              - 'backend/package*.json'
            compiler:
              - 'backend/compiler/queue-worker/**'
              - 'backend/shared/**'
              - 'backend/package*.json'
            queue_producer:
              - 'backend/compiler/queue-producer/**'
              - 'backend/package*.json'
              
  build-compiler:
    needs: [detect-changes, code-test]
    if: needs.detect-changes.outputs.compiler == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-image.yml
    secrets: inherit
    with:
      image-name: openlatex-compile
      dockerfile: ./backend/compiler/queue-worker/Dockerfile

  build-queue-producer:
    needs: [detect-changes, code-test]
    if: needs.detect-changes.outputs.queue_producer == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-image.yml
    secrets: inherit
    with:
      image-name: openlatex-queue-producer
      dockerfile: ./backend/compiler/queue-producer/Dockerfile

  deploy:
    needs: [build-compiler, build-queue-producer]
    if: always() && !failure() && !cancelled()
    runs-on: self-hosted
    steps:
      - name: Config SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Config SSH no strict host checking
        run: |
          mkdir -p ~/.ssh
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      - uses: actions/checkout@v4

      - name: Installer ansible
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible-core
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          export PATH="$HOME/.local/bin:$PATH"
          ansible-galaxy collection install community.docker

      - name: Déployer sur le VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
          REPO_URL: https://github.com/${{ github.repository }}.git
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TEST_BYPASS_SECRET: ${{ secrets.TEST_BYPASS_SECRET }}
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          ansible-playbook infra/ansible/playbooks/deploy-compose.yml \
            -i "$VPS_HOST," \
            -u "$VPS_USER"
            
      - name: Configurer la mise à jour du script backup par ansible
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
          B2_APPLICATION_KEY_ID: ${{ secrets.B2_APPLICATION_KEY_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
        run: |
          ansible-playbook infra/ansible/playbooks/setup-backup.yml \
            -i "$VPS_HOST," \
            -u "$VPS_USER" 

  deploy-k3s:
    needs: [build-compiler, build-queue-producer]
    if: always() && !failure() && !cancelled()
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Installer ansible et kubernetes.core
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible-core kubernetes openshift
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          export PATH="$HOME/.local/bin:$PATH"
          ansible-galaxy collection install kubernetes.core

      - name: Installer Helm
        uses: azure/setup-helm@v4

      - name: Config SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Récupérer le kubeconfig depuis le master
        run: |
          mkdir -p ${{ github.workspace }}/.kube
          # StrictHostKeyChecking=no pour simplifier (le master k3s est une instance différente du VPS, pas de known_hosts dédié)
          ssh -o StrictHostKeyChecking=no admin@${{ vars.K3S_MASTER_IP }} cat /etc/rancher/k3s/k3s.yaml > ${{ github.workspace }}/.kube/config
          sed -i "s/127.0.0.1/${{ vars.K3S_MASTER_IP }}/g" ${{ github.workspace }}/.kube/config
          chmod 600 ${{ github.workspace }}/.kube/config

      - name: Déployer le helm chart (namespace diff selon la branche)
        env:
          RELEASE_NAMESPACE: ${{ case(github.ref_name == 'main', 'openlatex-prod', 'openlatex-dev') }}
          # secret de contournement de la limite de compilation, utile pour les tests de charge
          TEST_BYPASS_SECRET: ${{ secrets.TEST_BYPASS_SECRET }}
        run: | 
          echo "deploy pour le namespace $RELEASE_NAMESPACE" 
          export KUBECONFIG=${{ github.workspace }}/.kube/config 
          ansible-playbook infra/ansible/playbooks/deploy-helm-chart.yml -e "target_namespace=$RELEASE_NAMESPACE"

  infra-load-tests:
    needs: [deploy, deploy-k3s]
    if: always() && !failure() && !cancelled()
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Installer k6
        run: |
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --batch --yes --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Test de charge (3 personas) pour vérifier que l'infra tient (Environ 250 compilations, devrait se faire en 1 min 30)
        env:
          TEST_BYPASS_SECRET: ${{ secrets.TEST_BYPASS_SECRET }}
        run: |
          cd infra/load-tests/k6 &&
          chmod +x all-personas.sh &&
          bash all-personas.sh Grouped
