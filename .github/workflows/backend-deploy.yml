name: (BACKEND) - Deploiement backend Docker VPS

on:
  push:
    branches: [backend/*]
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: config ssh
        uses: webfactory/ssh-agent@v0.7.0
        ## clé privée associée à la clé publique autorisée par l'utilisateur de connexion
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

          ## reconstruction du .env avec secrets (cat .env sur VPS pour check)
      - name: deploiement sur VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          ssh -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST <<EOF
            cd /home/admin/OpenLatex 2>/dev/null || (cd /home/deployer && git clone https://github.com/${{ github.repository }}.git OpenLatex && cd OpenLatex)
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            cd backend

            echo "POSTGRES_USER=$POSTGRES_USER" > .env
            echo "POSTGRES_PASSWORD=$POSTGRES_PASSWORD" >> .env
            echo "POSTGRES_DB=$POSTGRES_DB" >> .env
            echo "JWT_SECRET=$JWT_SECRET" >> .env
            echo "JWT_EXPIRES_IN=$JWT_EXPIRES_IN" >> .env
            echo "FRONTEND_URL=$FRONTEND_URL" >> .env
            echo "RESEND_API_KEY=$RESEND_API_KEY" >> .env

            chmod 600 .env
            docker compose down
            docker compose up -d --build
          EOF
