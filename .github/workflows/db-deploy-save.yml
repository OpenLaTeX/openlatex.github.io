name: (DB) - Setup sauvegarde PostgreSQL
# se lance après deploy-backend car le clone est fait dedans
on:
  workflow_run:
    workflows: ["(BACKEND) - Déploiement backend Docker VPS"]
    branches: [develop-bapi]
    types: [completed]
  workflow_dispatch:

jobs:
  setup-backup:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: config ssh
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: configuration backup sur VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST <<'EOF'
            # dossier de backup (dans home, pas besoin de sudo)
            mkdir -p /home/deployer/backups

            chmod +x /home/deployer/OpenLatex/backend/db-save/dump_db.sh

            # config le cron via crontab utilisateur (pour tester: * * * * *)
            (crontab -l 2>/dev/null | grep -v 'dump_db.sh'; echo '* * * * * /home/deployer/OpenLatex/backend/db-save/dump_db.sh') | crontab -

            # verif
            echo "Crontab configuré :"
            crontab -l
            echo "Script présent :"
            ls -la /home/deployer/OpenLatex/backend/db-save/dump_db.sh
          EOF
