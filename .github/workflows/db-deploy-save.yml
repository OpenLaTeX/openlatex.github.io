name: (DB) - Setup sauvegarde PostgreSQL
# se lance après deploy-backend car le clone est fait dedans
on:
  workflow_run:
    workflows: ["(DOCKER/BACKEND) - Construction et déploiement des images spécifiques + test infra"]
    types: [completed]
  workflow_dispatch:

jobs: 
  setup-backup:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: config ssh
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Setup known_hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - uses: actions/checkout@v4

      - name: Installer ansible
        run: pip install ansible-core


