name: (DOCKER) - Construction de l'image Compile

on:
  push:
    paths:
      - 'backend/compiler/**'
      - 'backend/package*.json'
    branches: [main, backend/release]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/compiler/Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/openlatex-compile:latest
