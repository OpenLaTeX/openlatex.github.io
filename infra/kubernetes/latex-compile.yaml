apiVersion: apps/v1
kind: Deployment
metadata:
  name: latex-compile
  namespace: default
spec:
  selector:
    matchLabels:
      app: latex-compile
  template:
    metadata:
      labels:
        app: latex-compile
    spec:
      containers:
      - name: latex-compile
        image: ghcr.io/openlatex/openlatex-compile:latest
        imagePullPolicy: Always
        envFrom: 
          - configMapRef:
              name: latex-compile-config
        resources:
          requests:
            cpu: 400m
            memory: 200Mi
          limits:
            cpu: 1200m
            memory: 400Mi
        ports:
          - containerPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: latex-compile-svc
  namespace: default
spec:
  type: NodePort
  selector:
    app: latex-compile
  ports:
  - port: 80
    targetPort: 9000
    nodePort: 30090
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler 
metadata:
  name: latex-compile-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: latex-compile 
  minReplicas: 4
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 120
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Pods
        value: 1
        periodSeconds: 120
---
apiVersion: v1
kind: ConfigMap 
data:
  FRONTEND_URL: https://openlatex.github.io
metadata:
  name: latex-compile-config
  namespace: default
