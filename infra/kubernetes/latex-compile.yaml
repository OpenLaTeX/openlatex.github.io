apiVersion: apps/v1
kind: Deployment
metadata:
  name: latex-compile
  namespace: default
spec:
  selector:
    matchLabels:
      app: latex-compile
  template:
    metadata:
      labels:
        app: latex-compile
    spec:
      containers:
      - name: latex-compile
        image: ghcr.io/openlatex/openlatex-compile:latest
        imagePullPolicy: Always
        envFrom: 
          - configMapRef:
              name: latex-compile-config
        resources:
          requests:
            cpu: 100m
        ports:
          - containerPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: latex-compile-svc
  namespace: default
spec:
  type: NodePort
  selector:
    app: latex-compile
  ports:
  - port: 80
    targetPort: 9000
    nodePort: 30090
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler 
metadata:
  name: latex-compile-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: latex-compile 
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource 
      resource:
        name: cpu
        target: 
          type: Utilization
          averageUtilization: 70  
--- 
apiVersion: v1
kind: ConfigMap 
data:
  FRONTEND_URL: https://openlatex.github.io
metadata:
  name: latex-compile-config
  namespace: default