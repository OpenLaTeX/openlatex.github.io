apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-agent
  namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-agent
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-agent
subjects:
  - kind: ServiceAccount
    name: prometheus-agent
    namespace: {{ .Values.namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-agent-config
  namespace: {{ .Values.namespace }}
data:
  prometheus.yml: |
{{ include "openlatex.prometheusAgentConfig" . | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-agent
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-agent
  template:
    metadata:
      annotations:
        checksum/prometheus-agent-config: {{ include "openlatex.prometheusAgentConfig" . | sha256sum }}
      labels:
        app: prometheus-agent
    spec:
      serviceAccountName: prometheus-agent
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: prometheus
          image: {{ .Values.images.prometheus }}
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--enable-feature=agent'
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: prometheus-agent-config
