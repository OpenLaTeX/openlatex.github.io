apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-agent
  namespace: {{ .Values.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-agent
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-agent
subjects:
  - kind: ServiceAccount
    name: prometheus-agent
    namespace: {{ .Values.namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-agent-config
  namespace: {{ .Values.namespace }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: 'k3s-compiler'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['{{ .Values.namespace }}']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: latex-compile-queue-producer
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            target_label: __address__
            replacement: ${1}:9000
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

      - job_name: 'kube-state-metrics'
        static_configs:
          - targets: ['kube-state-metrics-svc.{{ .Values.namespace }}.svc.cluster.local:8080']

    remote_write:
      - url: {{ .Values.remoteWriteUrl | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-agent
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-agent
  template:
    metadata:
      labels:
        app: prometheus-agent
    spec:
      serviceAccountName: prometheus-agent
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: prometheus
          image: {{ .Values.images.prometheus }}
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--agent'
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: prometheus-agent-config
