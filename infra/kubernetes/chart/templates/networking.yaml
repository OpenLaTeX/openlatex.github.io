# ici : services, ingress, networkpolicy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy 
metadata: 
  name: latex-networking-rules-queue-worker
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: latex-compile-queue-worker 
  policyTypes:
  - Egress
  
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: latex-compile-redis
      ports:
        - protocol: TCP
          port: 6379 
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy 
metadata: 
  name: latex-networking-rules-queue-producer
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: latex-compile-queue-producer 
  policyTypes:
  - Egress
  
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: latex-compile-redis
      ports:
        - protocol: TCP
          port: 6379 
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy 
metadata: 
  name: latex-networking-rules-redis
  namespace: {{ .Values.namespace }}
spec:
  podSelector:
    matchLabels:
      app: latex-compile-redis 
  policyTypes:
  - Ingress
  
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: latex-compile-queue-worker 
        - podSelector:
            matchLabels:
              app: latex-compile-queue-producer 
      ports:
        - protocol: TCP
          port: 6379 

          